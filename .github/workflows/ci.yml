name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check go2_audio/ tests/
      - run: ruff format --check go2_audio/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: python3 -m pytest tests/ -v --ignore=tests/test_noise_reducer.py

  test-noisereduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev,ros]"
      - run: python3 -m pytest tests/test_noise_reducer.py -v
    continue-on-error: true
